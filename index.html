<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英検2級 ぽろたん 600 - Professional Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --bg: #fefcf8; --primary: #ff8c00; --accent: #ffd700; --text: #4e342e; --danger: #ef5350; --success: #66bb6a; }
        body {
            font-family: "Hiragino Maru Gothic ProN", sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; touch-action: manipulation;
        }
        #menu-screen { width: 100%; max-width: 500px; padding: 20px; text-align: center; display: block; overflow-y: auto; max-height: 100vh; box-sizing: border-box; }
        .menu-title { font-size: 2.4rem; color: var(--primary); margin: 0; font-weight: 900; text-shadow: 2px 2px 0 #ffe082; }
        .stage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; padding-bottom: 40px; }
        .stage-card { 
            background: white; border: 3px solid #ffe082; padding: 12px; 
            border-radius: 18px; cursor: pointer; box-shadow: 0 4px 0 #ffe082;
            display: flex; flex-direction: column; align-items: center; transition: 0.1s;
        }
        .stage-card:active { transform: translateY(2px); box-shadow: none; }
        .best-record { font-size: 0.75rem; color: var(--success); font-weight: bold; background: #f1f8e9; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }

        #game-screen { display: none; width: 100%; max-width: 600px; flex-direction: column; height: 100vh; position: relative; }
        #header { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); background: #fffde7; border-bottom: 3px solid #ffe082; text-align: center; padding: 8px 0; }
        .stat-val { display: block; font-size: 1rem; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 0.6rem; font-weight: bold; }
        #game-container { flex-grow: 1; position: relative; background: white; overflow: hidden; }
        #falling-word { position: absolute; width: 100%; text-align: center; font-size: 2.2rem; font-weight: 900; top: -150px; color: #3e2723; padding: 0 10px; box-sizing: border-box; }
        
        #choice-area { height: 32%; display: grid; grid-template-rows: repeat(3, 1fr); gap: 8px; padding: 12px; background: #fffde7; border-top: 2px solid #fff59d; box-sizing: border-box; }
        .choice-btn { border: 3px solid #ffe082; background: white; font-size: 1.1rem; font-weight: bold; border-radius: 15px; cursor: pointer; color: var(--text); box-shadow: 0 4px 0 #ffe082; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fffde7; display: none; flex-direction: column; align-items: center; z-index: 100; padding: 15px; box-sizing: border-box; overflow: hidden; }
        .res-header { text-align: center; margin-bottom: 10px; }
        #result-time { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 5px 0; }
        #weak-words-container { width: 100%; max-width: 440px; background: white; border-radius: 15px; border: 2px solid var(--danger); padding: 10px; flex-grow: 1; overflow-y: auto; margin-bottom: 15px; box-sizing: border-box; }
        .weak-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        .weak-table td { padding: 6px 4px; border-bottom: 1px solid #f5f5f5; }
        .action-area { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .main-btn { padding: 12px; font-size: 1rem; font-weight: 900; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #e67e22; width: 100%; }
        .speak-btn { cursor: pointer; margin-left: 5px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="menu-screen">
    <h1 class="menu-title">ぽろたん</h1>
    <p style="font-weight:bold; color:#8d6e63; font-size: 0.9rem;">英検2級 実戦600語モード</p>
    <div class="stage-grid" id="stage-buttons"></div>
</div>

<div id="game-screen">
    <div id="header">
        <div><span class="stat-label">SCORE</span><span id="score-val" class="stat-val">0</span></div>
        <div><span class="stat-label">TIME</span><span id="timer-val" class="stat-val">0s</span></div>
        <div><span class="stat-label">COMBO</span><span id="combo-val" class="stat-val">0</span></div>
        <div><span class="stat-label">PROGRESS</span><span id="prog-val" class="stat-val">0/100</span></div>
    </div>
    <div id="game-container">
        <div id="falling-word"></div>
        <div id="overlay">
            <div class="res-header">
                <h2 style="margin:0; font-size:1.2rem;">STAGE CLEAR!</h2>
                <div id="result-time">0s</div>
                <div id="new-record-tag" style="color:var(--danger); font-weight:bold; font-size:0.8rem; display:none;">🔥 NEW BEST! 🔥</div>
            </div>
            <div id="weak-words-container">
                <div id="weak-list-content"></div>
            </div>
            <div class="action-area">
                <button class="main-btn" onclick="retryStage()">🔄 もう一度挑戦</button>
                <button class="main-btn" style="background:#795548; box-shadow:0 4px 0 #5d4037;" onclick="location.reload()">🏠 メニュー</button>
            </div>
        </div>
    </div>
    <div id="choice-area">
        <button class="choice-btn" onclick="handleInput(0)"></button>
        <button class="choice-btn" onclick="handleInput(1)"></button>
        <button class="choice-btn" onclick="handleInput(2)"></button>
    </div>
</div>

    const allStages = [parse(s1Raw), parse(s2Raw), parse(s3Raw), parse(s4Raw), parse(s5Raw), parse(s6Raw)];

    let currentStageIndex = 0, currentStageData = [], deck = [], score = 0, timeElapsed = 0, combo = 0, gameActive = false;
    let currentQ = null, dropPos = -100, dropSpeed = 2.4, animId = null, timerId = null, isProcessing = false, audioCtx, wordStats = {};

    function loadMenu() {
        document.getElementById('choice-area').style.display = 'grid'; // 初期化
        const grid = document.getElementById('stage-buttons');
        const names = ["英単語 I", "英単語 II", "英単語 III", "英単語 IV", "熟語 I", "熟語 II"];
        grid.innerHTML = '';
        names.forEach((name, i) => {
            const best = localStorage.getItem(`porotan_v5_best_s${i}`);
            const card = document.createElement('div');
            card.className = 'stage-card';
            card.onclick = () => selectStage(i);
            card.innerHTML = `<span style="font-size:0.65rem; color:#aaa;">STAGE ${i+1}</span><span style="font-weight:bold; margin:3px 0; font-size:0.95rem;">${name}</span>` + 
                (best ? `<div class="best-record">${best}s</div>` : `<div class="best-record" style="background:#eee;color:#ccc">---</div>`);
            grid.appendChild(card);
        });
    }

    window.onload = loadMenu;

    function selectStage(index) {
        currentStageIndex = index;
        currentStageData = allStages[index];
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        initGame();
    }

    function initGame() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        score = 0; timeElapsed = 0; combo = 0; gameActive = true; dropSpeed = 2.4; wordStats = {};
        currentStageData.forEach(q => wordStats[q.w] = { word: q.w, mean: q.m[0], miss: 0 });
        deck = [...currentStageData].sort(() => Math.random() - 0.5);
        document.getElementById('choice-area').style.display = 'grid';
        document.getElementById('overlay').style.display = 'none';
        updateUI(); startTimer(); nextWord();
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => { if (gameActive) { timeElapsed++; document.getElementById('timer-val').innerText = timeElapsed + "s"; } }, 1000);
    }

    function speakWord(word) {
        if(window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);
        }
    }

    function nextWord() {
        if (!gameActive) return;
        isProcessing = false;
        if (deck.length === 0) { stopGame(); return; }
        currentQ = deck.shift();
        const choices = [currentQ.m[0], ...currentQ.d].sort(() => Math.random() - 0.5);
        document.getElementById('falling-word').innerText = currentQ.w;
        const btns = document.querySelectorAll('.choice-btn');
        choices.forEach((t, i) => { btns[i].innerText = t; btns[i].style.visibility = "visible"; btns[i].style.opacity = "1"; });
        speakWord(currentQ.w);
        dropPos = -100;
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(updateFrame);
    }

    function updateFrame() {
        if (!gameActive || isProcessing) return;
        dropPos += dropSpeed;
        document.getElementById('falling-word').style.top = dropPos + 'px';
        if (dropPos > document.getElementById('game-container').clientHeight - 20) {
            isProcessing = true; playTone(150, 'square');
            combo = 0; wordStats[currentQ.w].miss++;
            updateUI(); deck.push(currentQ); setTimeout(nextWord, 200);
        } else { animId = requestAnimationFrame(updateFrame); }
    }

    function handleInput(idx) {
        if (!gameActive || isProcessing) return;
        const selected = document.querySelectorAll('.choice-btn')[idx].innerText;
        if (selected === currentQ.m[0]) {
            isProcessing = true; playTone(880, 'sine');
            score += Math.floor((100 + Math.max(0, 500 - dropPos)) * (1 + combo/10));
            combo++; dropSpeed += 0.015;
            updateUI(); nextWord();
        } else {
            playTone(150, 'square');
            combo = 0; wordStats[currentQ.w].miss++;
            updateUI();
            document.querySelectorAll('.choice-btn')[idx].style.opacity = "0.3";
        }
    }

    function playTone(freq, type) {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function updateUI() {
        document.getElementById('score-val').innerText = score.toLocaleString();
        document.getElementById('combo-val').innerText = combo;
        document.getElementById('prog-val').innerText = `${currentStageData.length - deck.length}/${currentStageData.length}`;
    }

    function stopGame() {
        gameActive = false; clearInterval(timerId); cancelAnimationFrame(animId);
        
        document.getElementById('choice-area').style.display = 'none';

        const key = `porotan_v5_best_s${currentStageIndex}`; // 新しいデータセット用に記録キーを更新
        const prevBest = localStorage.getItem(key);
        let isNew = !prevBest || timeElapsed < parseInt(prevBest);
        if (isNew) localStorage.setItem(key, timeElapsed);
        
        document.getElementById('result-time').innerText = timeElapsed + "s";
        document.getElementById('new-record-tag').style.display = isNew ? "block" : "none";
        
        let weak = Object.values(wordStats).filter(s => s.miss > 0).sort((a,b) => b.miss - a.miss);
        let html = '<h3 style="color:var(--danger); font-size:0.9rem; margin:0 0 10px 0; border-bottom:1px solid #eee;">🚨 要復習リスト</h3>';
        html += weak.length ? '<table class="weak-table">' + weak.map(s => `<tr><td><strong>${s.word}</strong><span class="speak-btn" onclick="speakWord('${s.word}')">🔊</span></td><td style="color:var(--danger)">×${s.miss}</td><td>${s.mean}</td></tr>`).join('') + '</table>' : '<p style="color:var(--success); font-weight:bold; text-align:center;">PERFECT! 🚀</p>';
        document.getElementById('weak-list-content').innerHTML = html;
        document.getElementById('overlay').style.display = 'flex';
    }

    function retryStage() { 
        document.getElementById('overlay').style.display = 'none'; 
        document.getElementById('choice-area').style.display = 'grid';
        initGame(); 
    }
</script>
