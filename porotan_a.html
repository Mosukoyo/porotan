<!DOCTYPE html>

    <style>
        :root { --bg: #fdfbf6; --primary: #ff8c00; --accent: #ffd700; --text: #5d4037; }
        body {
            font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; touch-action: manipulation;
        }
        /* メニュー画面 */
        #menu-screen { width: 100%; max-width: 500px; padding: 30px 20px; text-align: center; display: block; overflow-y: auto; max-height: 100vh; }
        .menu-title { font-size: 2.8rem; color: var(--primary); margin: 0; font-weight: 900; text-shadow: 2px 2px 0 #ffe082; }
        .menu-subtitle { font-size: 1rem; margin-bottom: 25px; font-weight: bold; opacity: 0.8; }
        .stage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; padding-bottom: 40px; }
        .stage-card { 
            background: white; border: 3px solid #ffe082; padding: 15px; 
            border-radius: 18px; cursor: pointer; box-shadow: 0 4px 0 #ffe082;
            display: flex; flex-direction: column; justify-content: center; transition: 0.1s;
        }
        .stage-card:active { transform: translateY(2px); box-shadow: none; }
        .stage-num { display: block; font-size: 0.7rem; font-weight: bold; color: #8d6e63; }
        .stage-name { display: block; font-size: 0.95rem; font-weight: bold; margin-top: 4px; }

        /* ゲーム画面 */
        #game-screen { display: none; width: 100%; max-width: 600px; flex-direction: column; height: 100vh; position: relative; }
        #header { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); background: #fff8e1; border-bottom: 2px solid #ffe082; text-align: center; padding: 8px 0; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.65rem; font-weight: bold; }
        #game-container { flex-grow: 1; position: relative; background: white; overflow: hidden; }
        #falling-word { position: absolute; width: 100%; text-align: center; font-size: 2.2rem; font-weight: 800; top: -150px; color: #3e2723; padding: 0 10px; box-sizing: border-box; }
        #choice-area { height: 35%; display: grid; grid-template-rows: repeat(3, 1fr); gap: 8px; padding: 12px; background: #fffde7; }
        .choice-btn { border: 3px solid #ffe082; background: white; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; color: var(--text); box-shadow: 0 3px 0 #ffe082; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .choice-btn.wrong { visibility: hidden; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 248, 225, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .main-btn { padding: 12px 40px; font-size: 1.4rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #e67e22; margin-top: 15px; }
    </style>
</head>

<div id="menu-screen">
    <h1 class="menu-title">ぽろたん</h1>
    <p class="menu-subtitle">英検2級 600のステップ</p>
    <div class="stage-grid" id="stage-buttons"></div>
</div>

<div id="game-screen">

        <div><span class="stat-label">すすみ</span><span id="prog-val" class="stat-val">0%</span></div>
    </div>
    <div id="game-container">
        <div id="falling-word"></div>
        <div id="overlay">
            <h2 id="result-title" style="font-size:2rem; color:var(--primary); margin:0;">終了！</h2>
            <div id="result-score" style="font-size:1.8rem; font-weight:bold; margin:15px 0;">0 てん</div>
            <button class="main-btn" onclick="backToMenu()">メニューへもどる</button>

    </div>
    <div id="choice-area">

        <button class="choice-btn" onclick="handleInput(1)"></button>
        <button class="choice-btn" onclick="handleInput(2)"></button>

            playTone(880, 'sine');
            const bonus = Math.max(0, Math.floor((600 - dropPos) / 5));
            score += Math.floor((100 + bonus) * (1 + combo/10));
            combo++; dropSpeed += 0.03;
            updateUI(); nextWord();
        } else {
            playTone(150, 'square');
            combo = 0; updateUI();
            document.querySelectorAll('.choice-btn')[idx].style.visibility = "hidden";
        }
    }

    function playTone(freq, type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function updateUI() {
        document.getElementById('score-val').innerText = score.toLocaleString();
        document.getElementById('combo-val').innerText = combo;
        const prog = Math.floor(((currentStageData.length - deck.length) / currentStageData.length) * 100);
        document.getElementById('prog-val').innerText = prog + "%";
    }

    function stopGame() {
        gameActive = false;
        clearInterval(timerId);
        cancelAnimationFrame(animId);
        document.getElementById('result-score').innerText = score.toLocaleString() + " てん";
        document.getElementById('overlay').style.display = 'flex';
    }
</script>
</body>
</html>
